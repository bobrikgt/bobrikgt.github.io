<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>FREDDYGT</title>
    <style>
        .kartinkafreddy{
            scale: 50%;
        }
        body {
            background-image: url('dreamcore.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
<div>
    <h1>dreamcore freddy <a href="index.html">go back to bobrikgt</a></h1>
    <img src="freddy.jpeg" class="kartinkafreddy">
</div>
<script>
    const song = document.createElement('audio');
    song.src = "song.mp3";
    song.loop = true;
    document.addEventListener('click', function() {
        song.play()
            .then(() => {})
            .catch(error => { console.error(error);
            });
        },
        { once: true }
    );
    $(document).ready(function(){
        $(document).click(song.play())
        $(".kartinkafreddy").click(function(){
            $(".kartinkafreddy").attr("src", "strashniyfreddy.png");
            song.pause()
            setTimeout(function(){ window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; }, 1000);
        })
    })
</script>
</body>
</html>
